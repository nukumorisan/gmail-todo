name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: リリースを作成
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: pnpmを設定
        uses: pnpm/action-setup@v6

      - name: Node.jsを設定
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: 依存関係をインストール
        run: pnpm install --frozen-lockfile

      - name: GASを検証
        run: |
          for file in src/*.js; do
            node --check "$file" || exit 1
          done
          node combine.js
          node --check dist/gas.js
          git diff --exit-code -- dist/gas.js

      - name: 日本語フォントを設定
        run: |
          sudo apt-get update
          sudo apt-get install --yes fonts-noto-cjk
          fc-match "Noto Sans CJK JP" | grep --quiet "NotoSansCJK"

      - name: PDFを生成
        run: pnpm docs:pdf

      - name: Releaseを作成
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/gas.js \
            doc/deployment-and-initial-setup.pdf \
            --generate-notes \
            --title "${GITHUB_REF_NAME}" \
            --verify-tag
